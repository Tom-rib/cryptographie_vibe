name: Run Validation Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run JOUR1_PARTIE1 validation
      run: python tests/validate_jour1_partie1.py

    - name: Run JOUR1_PARTIE2 validation
      run: python tests/validate_jour1_partie2.py

    - name: Run JOUR2_PARTIE1 validation
      run: python tests/validate_jour2_partie1.py

    - name: Run JOUR2_PARTIE2 validation
      run: python tests/validate_jour2_partie2.py

    - name: Run JOUR3_PARTIE1 validation
      run: python tests/validate_jour3_partie1.py

    - name: Run JOUR3_PARTIE2 validation
      run: python tests/validate_jour3_partie2.py

    - name: Lint code
      run: |
        pip install pylint
        pylint src/ tests/ --disable=missing-docstring,too-few-public-methods,line-too-long || true

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build package
      run: |
        pip install build
        python -m build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: python-package
        path: dist/
